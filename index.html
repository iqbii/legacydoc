<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegacyDoc - AI Code Documentation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
    .header { padding: 24px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 22px; font-weight: 700; color: #fff; }
    .logo span { color: #f97316; }
    .tagline { font-size: 13px; color: #666; }
    .container { max-width: 900px; margin: 0 auto; padding: 48px 24px; }
    h1 { font-size: 36px; font-weight: 700; margin-bottom: 12px; }
    h1 span { color: #f97316; }
    .subtitle { color: #888; font-size: 16px; margin-bottom: 40px; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    label { font-size: 13px; color: #888; display: block; margin-bottom: 8px; }
    textarea { width: 100%; background: #0f0f0f; border: 1px solid #333; border-radius: 8px; padding: 16px; color: #fff; font-family: monospace; font-size: 14px; resize: vertical; min-height: 200px; outline: none; }
    textarea:focus { border-color: #f97316; }
    button { background: #f97316; color: #fff; border: none; border-radius: 8px; padding: 14px 32px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 16px; transition: opacity .2s; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .output { background: #0f0f0f; border: 1px solid #333; border-radius: 8px; padding: 16px; font-size: 14px; line-height: 1.7; color: #ccc; white-space: pre-wrap; min-height: 100px; font-family: monospace; }
    .status { font-size: 13px; color: #f97316; margin-top: 12px; display: none; }
    .footer { text-align: center; color: #444; font-size: 13px; margin-top: 48px; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="logo">Legacy<span>Doc</span></div>
      <div class="tagline">AI-powered code documentation</div>
    </div>
  </div>

  <div class="container">
    <h1>Document your code with <span>AI</span></h1>
    <p class="subtitle">Paste any messy, undocumented code and get clean professional docs in seconds.</p>

    <div class="card">
      <label>PASTE YOUR CODE</label>
      <textarea id="codeInput" placeholder="Paste your code here..."></textarea>
      <button id="generateBtn" onclick="generate()">Generate Documentation</button>
      <div class="status" id="status">⏳ Generating documentation...</div>
    </div>

    <div class="card">
      <label>DOCUMENTATION OUTPUT</label>
      <div class="output" id="output">Your documentation will appear here...</div>
    </div>

    <div class="footer">Built with Claude AI · Deployed on AWS Lambda</div>
  </div>

  <script>
    async function generate() {
      const code = document.getElementById('codeInput').value.trim();
      if (!code) { alert('Please paste some code first!'); return; }

      const btn = document.getElementById('generateBtn');
      const status = document.getElementById('status');
      const output = document.getElementById('output');

      btn.disabled = true;
      status.style.display = 'block';
      output.textContent = 'Generating...';

      try {
        const response = await fetch('https://bkwzgbgwghe5krr2afw7x4khei0dweii.lambda-url.us-east-1.on.aws/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        const data = await response.json();
        output.textContent = data.documentation || data.error || 'Something went wrong';
      } catch (err) {
        output.textContent = 'Error: ' + err.message;
      } finally {
        btn.disabled = false;
        status.style.display = 'none';
      }
    }
  </script>
</body>
</html>
