<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XPNYKK6GRE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XPNYKK6GRE');
  </script>
  <title>LegacyDoc - AI Code Documentation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
    .header { padding: 24px; border-bottom: 1px solid #222; }
    .logo { font-size: 22px; font-weight: 700; }
    .logo span { color: #f97316; }
    .tagline { font-size: 13px; color: #666; }
    .container { max-width: 900px; margin: 0 auto; padding: 48px 24px; }
    h1 { font-size: 36px; font-weight: 700; margin-bottom: 12px; }
    h1 span { color: #f97316; }
    .subtitle { color: #888; font-size: 16px; margin-bottom: 40px; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    label { font-size: 13px; color: #888; display: block; margin-bottom: 8px; }
    textarea { width: 100%; background: #0f0f0f; border: 1px solid #333; border-radius: 8px; padding: 16px; color: #fff; font-family: monospace; font-size: 14px; resize: vertical; min-height: 200px; outline: none; }
    textarea:focus { border-color: #f97316; }
    button { background: #f97316; color: #fff; border: none; border-radius: 8px; padding: 14px 32px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 16px; transition: opacity .2s; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .output { background: #0f0f0f; border: 1px solid #333; border-radius: 8px; padding: 16px; font-size: 14px; line-height: 1.7; color: #ccc; white-space: pre-wrap; min-height: 100px; font-family: monospace; }
    .error-box { background: #1a0a0a; border: 1px solid #5a1a1a; border-radius: 8px; padding: 16px; margin-top: 12px; display: none; }
    .error-box .error-title { color: #f87171; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .error-box .error-detail { color: #aaa; font-size: 13px; font-family: monospace; line-height: 1.6; }
    .error-box .error-fix { color: #86efac; font-size: 12px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #2a1a1a; }
    .status { font-size: 13px; color: #f97316; margin-top: 12px; display: none; }
    .footer { text-align: center; color: #444; font-size: 13px; margin-top: 48px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Legacy<span>Doc</span></div>
    <div class="tagline">AI-powered code documentation</div>
  </div>

  <div class="container">
    <h1>Document your code with <span>AI</span></h1>
    <p class="subtitle">Paste any messy, undocumented code and get clean professional docs in seconds.</p>

    <div class="card">
      <label>PASTE YOUR CODE</label>
      <textarea id="codeInput" placeholder="Paste your code here..."></textarea>
      <button id="generateBtn" onclick="generate()">Generate Documentation</button>
      <div class="status" id="status">⏳ Generating documentation...</div>
    </div>

    <div class="card">
      <label>DOCUMENTATION OUTPUT</label>
      <div class="output" id="output">Your documentation will appear here...</div>
      <div class="error-box" id="errorBox">
        <div class="error-title">❌ Error Details</div>
        <div class="error-detail" id="errorDetail"></div>
        <div class="error-fix" id="errorFix"></div>
      </div>
    </div>

    <div class="footer">Built with Claude AI · Deployed on AWS Lambda</div>
  </div>

  <script>
    function getErrorFix(status, message) {
      if (!status || message.includes("fetch") || message.includes("Load failed") || message.includes("NetworkError")) {
        return "💡 Fix: CORS or network issue. The API may be temporarily unavailable. Try again in a moment.";
      }
      if (status === 400) return "💡 Fix: No code was sent. Make sure you've pasted code before clicking Generate.";
      if (status === 401 || status === 403) return "💡 Fix: API key issue. The server's Anthropic key may be invalid or expired.";
      if (status === 429) return "💡 Fix: Rate limit hit. Too many requests — wait 30 seconds and try again.";
      if (status === 500) return "💡 Fix: Server error. Check that the Lambda function is running correctly.";
      if (status === 503) return "💡 Fix: Service unavailable. AWS Lambda may be cold starting — try again in 10 seconds.";
      return "💡 Fix: Unexpected error. Try refreshing the page and submitting again.";
    }

    async function generate() {
      const code = document.getElementById('codeInput').value.trim();
      if (!code) { alert('Please paste some code first!'); return; }

      const btn = document.getElementById('generateBtn');
      const status = document.getElementById('status');
      const output = document.getElementById('output');
      const errorBox = document.getElementById('errorBox');
      const errorDetail = document.getElementById('errorDetail');
      const errorFix = document.getElementById('errorFix');

      btn.disabled = true;
      status.style.display = 'block';
      output.textContent = 'Generating...';
      errorBox.style.display = 'none';

      try {
        const response = await fetch('https://bx2z57pll0.execute-api.us-east-1.amazonaws.com/prod/document', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });

        const data = await response.json();

        if (!response.ok || data.error) {
          const errMsg = data.error || `HTTP ${response.status} - ${response.statusText}`;
          output.textContent = 'Documentation generation failed.';
          errorDetail.textContent = `Status: ${response.status}\nMessage: ${errMsg}`;
          errorFix.textContent = getErrorFix(response.status, errMsg);
          errorBox.style.display = 'block';
        } else {
          output.textContent = data.documentation;
        }
      } catch (err) {
        output.textContent = 'Documentation generation failed.';
        errorDetail.textContent = `Type: ${err.name}\nMessage: ${err.message}`;
        errorFix.textContent = getErrorFix(null, err.message);
        errorBox.style.display = 'block';
      } finally {
        btn.disabled = false;
        status.style.display = 'none';
      }
    }
  </script>
</body>
</html>
